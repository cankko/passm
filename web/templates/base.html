<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ template "title" . }}</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico" />
    <link href="/static/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
    <script src="/static/js/bootstrap.min.js" crossorigin="anonymous"></script>
    {{ template "style" }}
</head>
<body>
    <header class="text-bg-secondary p-3" style="height: 70px">
        <span style="font-size: 24px; font-weight: bold">PassM</span>
        {{if .IsLogged }}<a href="/logout/" class="btn btn-outline-light float-end">logout</a>{{end}}
    </header>
    <div class="container mt-5">{{ template "body" . }}</div>
    {{ template "script" . }}
</body>
</html>
